version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install -r requirements-dev.txt
    - pip install -e .
    - wget https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.56/quarto-1.5.56-linux-amd64.tar.gz
    - tar -xzf quarto-1.5.56-linux-amd64.tar.gz
    - export PATH=$PWD/quarto-1.5.56/bin:$PATH
    - rm quarto-1.5.56-linux-amd64.tar.gz
    - quartodoc build --config docs/_quarto.yml
    - ./quarto-1.5.56/bin/quarto render docs/
    - mkdir -p _readthedocs/html
    - mv docs/_site/* _readthedocs/html
